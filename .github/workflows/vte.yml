name: VTE

on:
  push:
    branches: [master, main]
    paths:
      - "pkgs/vte/**"
      - "pubspec.yaml"
      - ".github/workflows/vte.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "pkgs/vte/**"
      - "pubspec.yaml"
      - ".github/workflows/vte.yml"

jobs:
  # ── Build native library + run Dart tests ──────────────────────────
  # NOTE: macOS is excluded because Zig-built dylibs lack Mach-O
  # header padding (-headerpad_max_install_names) and the Dart SDK's
  # install_name_tool rewrite fails.  Once Ghostty's build.zig adds
  # the flag, macOS can be re-enabled.
  #
  # This job relies on the build hook downloading a prebuilt binary from
  # a GitHub release.  Building from source with Zig exceeds free-tier
  # runner limits.  If the download fails (e.g. missing release), the
  # build hook falls back to source compilation which will time out.
  test-native:
    if: false  # Disabled: zig source build exceeds free-tier runner limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Verify Zig
        run: zig version

      - name: Install dependencies
        run: flutter pub get

      - name: Run ghostty_vte tests
        working-directory: pkgs/vte/ghostty_vte
        run: dart test -r expanded

  # ── Verify committed WASM module ─────────────────────────────────
  # The wasm binary is committed to the repo (built locally) because
  # compiling it from source via Zig exceeds free-tier CI runner limits.
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify WASM artifact exists
        run: |
          ls -lh pkgs/vte/ghostty_vte_flutter/assets/ghostty-vt.wasm
          file pkgs/vte/ghostty_vte_flutter/assets/ghostty-vt.wasm

  # ── Flutter package tests ──────────────────────────────────────────
  test-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run ghostty_vte_flutter tests
        run: flutter test pkgs/vte/ghostty_vte_flutter/test
