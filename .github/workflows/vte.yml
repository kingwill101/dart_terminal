name: VTE

on:
  push:
    branches: [master, main]
    paths:
      - "pkgs/vte/**"
      - "pubspec.yaml"
      - "tool/apply_ghostty_vte_source_patches.sh"
      - "tool/verify_vte_android_libc.sh"
      - ".github/workflows/vte.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "pkgs/vte/**"
      - "pubspec.yaml"
      - "tool/apply_ghostty_vte_source_patches.sh"
      - "tool/verify_vte_android_libc.sh"
      - ".github/workflows/vte.yml"

jobs:
  build-vte-artifacts:
    name: "build-vte-${{ matrix.os_label }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux-gnu
            artifact: libghostty-vt.so
            os_label: linux-x64
          - runner: ubuntu-latest
            target: aarch64-linux-gnu
            artifact: libghostty-vt.so
            os_label: linux-arm64
          - runner: ubuntu-latest
            target: aarch64-macos
            artifact: libghostty-vt.dylib
            os_label: macos-arm64
          - runner: ubuntu-latest
            target: x86_64-macos
            artifact: libghostty-vt.dylib
            os_label: macos-x64
          - runner: ubuntu-latest
            target: x86_64-windows-gnu
            artifact: ghostty-vt.dll
            os_label: windows-x64
          - runner: ubuntu-latest
            target: aarch64-windows-gnu
            artifact: ghostty-vt.dll
            os_label: windows-arm64
          - runner: ubuntu-latest
            target: aarch64-linux-android
            artifact: libghostty-vt.so
            os_label: android-arm64
          - runner: ubuntu-latest
            target: arm-linux-androideabi
            artifact: libghostty-vt.so
            os_label: android-arm
          - runner: ubuntu-latest
            target: x86_64-linux-android
            artifact: libghostty-vt.so
            os_label: android-x64
          - runner: macos-latest
            target: aarch64-ios
            artifact: libghostty-vt.dylib
            os_label: ios-arm64
          - runner: macos-latest
            target: aarch64-ios-simulator
            artifact: libghostty-vt.dylib
            os_label: ios-sim-arm64
          - runner: macos-latest
            target: x86_64-ios-simulator
            artifact: libghostty-vt.dylib
            os_label: ios-sim-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install binary inspection tools
        if: contains(matrix.target, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Apply bundled Ghostty source patches
        run: ./tool/apply_ghostty_vte_source_patches.sh

      - name: Build libghostty-vt (${{ matrix.target }})
        working-directory: pkgs/vte/ghostty_vte/third_party/ghostty
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build-prefix"
          zig build \
            -Demit-lib-vt=true \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseFast \
            -Dsimd=false \
            --prefix "$GITHUB_WORKSPACE/build-prefix" \
            --summary failures
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Locate built VTE artifact
        id: locate_vte
        run: |
          LIB=$(
            find "$GITHUB_WORKSPACE/build-prefix" \
              \( -type f -o -type l \) \
              \( -name '${{ matrix.artifact }}' -o -name '${{ matrix.artifact }}.*' \) \
              | sort \
              | head -1
          )
          if [ -z "$LIB" ]; then
            echo "::error::Could not find ${{ matrix.artifact }} in build-prefix"
            find "$GITHUB_WORKSPACE/build-prefix" -type f
            exit 1
          fi
          echo "path=$LIB" >> "$GITHUB_OUTPUT"

      - name: Verify Android libghostty-vt links libc
        if: contains(matrix.target, 'android')
        run: ./tool/verify_vte_android_libc.sh "${{ steps.locate_vte.outputs.path }}"

      - name: Package VTE artifact
        run: |
          ARTIFACT_DIR="$GITHUB_WORKSPACE/vte-${{ matrix.os_label }}-artifact"
          mkdir -p "$ARTIFACT_DIR"
          cp -L "${{ steps.locate_vte.outputs.path }}" \
            "$ARTIFACT_DIR/${{ matrix.artifact }}"
          file "${{ steps.locate_vte.outputs.path }}" \
            > "$ARTIFACT_DIR/file.txt"
          if [ "${{ contains(matrix.target, 'android') }}" = "true" ]; then
            readelf -d "${{ steps.locate_vte.outputs.path }}" \
              > "$ARTIFACT_DIR/readelf-dynamic.txt"
          fi

      - name: Upload VTE artifact
        uses: actions/upload-artifact@v4
        with:
          name: vte-${{ matrix.os_label }}-check
          path: ${{ github.workspace }}/vte-${{ matrix.os_label }}-artifact

  # ── Build native library + run Dart tests ──────────────────────────
  # NOTE: macOS is excluded because Zig-built dylibs lack Mach-O
  # header padding (-headerpad_max_install_names) and the Dart SDK's
  # install_name_tool rewrite fails.  Once Ghostty's build.zig adds
  # the flag, macOS can be re-enabled.
  #
  # This job relies on the build hook downloading a prebuilt binary from
  # a GitHub release.  Building from source with Zig exceeds free-tier
  # runner limits.  If the download fails (e.g. missing release), the
  # build hook falls back to source compilation which will time out.
  test-native:
    if: false  # Disabled: zig source build exceeds free-tier runner limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Verify Zig
        run: zig version

      - name: Install dependencies
        run: flutter pub get

      - name: Run ghostty_vte tests
        working-directory: pkgs/vte/ghostty_vte
        run: dart test -r expanded

  # ── Verify committed WASM module ─────────────────────────────────
  # The wasm binary is committed to the repo (built locally) because
  # compiling it from source via Zig exceeds free-tier CI runner limits.
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify WASM artifact exists
        run: |
          ls -lh pkgs/vte/ghostty_vte_flutter/assets/ghostty-vt.wasm
          file pkgs/vte/ghostty_vte_flutter/assets/ghostty-vt.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vte-wasm-check
          path: pkgs/vte/ghostty_vte_flutter/assets/ghostty-vt.wasm

  # ── Flutter package tests ──────────────────────────────────────────
  test-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run ghostty_vte_flutter tests
        run: flutter test pkgs/vte/ghostty_vte_flutter/test
