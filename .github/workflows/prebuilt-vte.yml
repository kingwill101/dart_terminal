name: Prebuilt VTE Libraries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. ghostty_vte-v0.1.2). If empty, artifacts are uploaded but no release is created."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

  push:
    tags:
      - "ghostty_vte-v*"

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # ════════════════════════════════════════════════════════════════════
  #  VTE — Zig cross-compiled shared libraries
  # ════════════════════════════════════════════════════════════════════
  vte-native:
    name: "VTE ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-linux-gnu
            artifact: libghostty-vt.so
            os_label: linux-x64
          - target: aarch64-linux-gnu
            artifact: libghostty-vt.so
            os_label: linux-arm64

          # macOS (cross-compiled from Linux via Zig)
          - target: aarch64-macos
            artifact: libghostty-vt.dylib
            os_label: macos-arm64
          - target: x86_64-macos
            artifact: libghostty-vt.dylib
            os_label: macos-x64

          # Windows
          - target: x86_64-windows-gnu
            artifact: ghostty-vt.dll
            os_label: windows-x64
          - target: aarch64-windows-gnu
            artifact: ghostty-vt.dll
            os_label: windows-arm64

          # Android
          - target: aarch64-linux-android
            artifact: libghostty-vt.so
            os_label: android-arm64
          - target: arm-linux-androideabi
            artifact: libghostty-vt.so
            os_label: android-arm
          - target: x86_64-linux-android
            artifact: libghostty-vt.so
            os_label: android-x64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install binary inspection tools
        if: contains(matrix.target, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Apply bundled Ghostty source patches
        run: ./tool/apply_ghostty_vte_source_patches.sh

      - name: Build libghostty-vt (${{ matrix.target }})
        working-directory: pkgs/vte/ghostty_vte/third_party/ghostty
        run: |
          mkdir -p ${{ github.workspace }}/build-prefix
          zig build \
            -Demit-lib-vt=true \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseFast \
            -Dsimd=false \
            --prefix ${{ github.workspace }}/build-prefix \
            --summary failures
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Locate artifact
        id: locate
        run: |
          # Zig installs platform artifacts under different prefixes:
          # shared libraries in lib/ on Unix-like targets and DLLs in bin/ on Windows.
          # It may also emit an unversioned symlink plus a versioned real file.
          LIB=$(
            find ${{ github.workspace }}/build-prefix \
              \( -type f -o -type l \) \
              \( -name '${{ matrix.artifact }}' -o -name '${{ matrix.artifact }}.*' \) \
              | sort \
              | head -1
          )
          if [ -z "$LIB" ]; then
            echo "::error::Could not find any ghostty-vt library"
            find ${{ github.workspace }}/build-prefix -type f
            exit 1
          fi
          TARGET=$(readlink -f "$LIB" || printf '%s' "$LIB")
          KIND=$(file -b "$TARGET")
          case "${{ matrix.artifact }}" in
            *.so)
              echo "$KIND" | grep -q 'ELF' || {
                echo "::error::Expected an ELF shared library, got: $KIND"
                exit 1
              }
              ;;
            *.dylib)
              echo "$KIND" | grep -q 'Mach-O' || {
                echo "::error::Expected a Mach-O dylib, got: $KIND"
                exit 1
              }
              ;;
            *.dll)
              echo "$KIND" | grep -q 'PE32' || {
                echo "::error::Expected a PE DLL, got: $KIND"
                exit 1
              }
              ;;
          esac
          echo "path=$LIB" >> "$GITHUB_OUTPUT"
          echo "Found: $LIB -> $TARGET ($(wc -c < "$TARGET") bytes, $KIND)"

      - name: Verify Android libghostty-vt links libc
        if: contains(matrix.target, 'android')
        run: ./tool/verify_vte_android_libc.sh "${{ steps.locate.outputs.path }}"

      - name: Package artifact
        run: |
          mkdir -p staging
          # Rename to canonical unversioned name for consumers
          cp -L "${{ steps.locate.outputs.path }}" staging/${{ matrix.artifact }}
          cd staging
          tar czf ../vte-${{ matrix.os_label }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vte-${{ matrix.os_label }}
          path: vte-${{ matrix.os_label }}.tar.gz

  # ── VTE WASM ───────────────────────────────────────────────────────
  vte-wasm:
    name: "VTE wasm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build ghostty-vt.wasm
        working-directory: pkgs/vte/ghostty_vte/third_party/ghostty
        run: |
          mkdir -p ${{ github.workspace }}/build-prefix
          zig build \
            -Demit-lib-vt=true \
            -Dtarget=wasm32-freestanding \
            -Doptimize=ReleaseFast \
            -Dsimd=false \
            --prefix ${{ github.workspace }}/build-prefix \
            --summary failures

      - name: Locate artifact
        id: locate
        run: |
          WASM=$(find ${{ github.workspace }}/build-prefix -name '*.wasm' -type f | head -1)
          if [ -z "$WASM" ]; then
            echo "::error::Could not find wasm artifact"
            find ${{ github.workspace }}/build-prefix -type f
            exit 1
          fi
          echo "path=$WASM" >> "$GITHUB_OUTPUT"
          echo "Found: $WASM ($(wc -c < "$WASM") bytes)"

      - name: Package artifact
        run: |
          mkdir -p staging
          cp "${{ steps.locate.outputs.path }}" staging/ghostty-vt.wasm
          tar czf vte-wasm.tar.gz -C staging ghostty-vt.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vte-wasm
          path: vte-wasm.tar.gz

  # ════════════════════════════════════════════════════════════════════
  #  Release — collect VTE artifacts and publish a GitHub release
  # ════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/ghostty_vte-v') || github.event.inputs.tag != ''
    needs: [vte-native, vte-wasm]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release metadata
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          elif printf '%s' "$TAG" | grep -q -- '-'; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Prerelease: $PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.tag }}"
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            artifacts/**/*.tar.gz

  # ════════════════════════════════════════════════════════════════════
  #  Update asset hashes — regenerate and commit after release
  # ════════════════════════════════════════════════════════════════════
  update-hashes:
    name: Update Asset Hashes
    if: needs.release.outputs.prerelease != 'true'
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate asset hashes
        run: dart run tool/write_asset_hashes.dart --tag ${{ needs.release.outputs.tag }} --package vte
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/vte/ghostty_vte/lib/src/hook/asset_hashes.dart
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update asset hashes for ${{ needs.release.outputs.tag }}"
            git push
          fi
