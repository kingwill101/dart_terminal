name: Prebuilt PTY Libraries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. portable_pty-v0.0.4). If empty, artifacts are uploaded but no release is created."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

  push:
    tags:
      - "portable_pty-v*"

permissions:
  contents: write

env:
  RUST_VERSION: "1.92.0"

jobs:
  # ════════════════════════════════════════════════════════════════════
  #  PTY — Rust cross-compiled shared libraries
  # ════════════════════════════════════════════════════════════════════
  pty-native:
    name: "PTY ${{ matrix.os_label }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            artifact: libportable_pty_rs.so
            os_label: linux-x64
          - runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            artifact: libportable_pty_rs.so
            os_label: linux-arm64
            cross: true

          # ── macOS ──
          - runner: macos-latest
            rust_target: aarch64-apple-darwin
            artifact: libportable_pty_rs.dylib
            os_label: macos-arm64
          - runner: macos-latest
            rust_target: x86_64-apple-darwin
            artifact: libportable_pty_rs.dylib
            os_label: macos-x64

          # ── Windows ──
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact: portable_pty_rs.dll
            os_label: windows-x64

          # ── Android (cross from Linux) ──
          - runner: ubuntu-latest
            rust_target: aarch64-linux-android
            artifact: libportable_pty_rs.so
            os_label: android-arm64
            cross: true
          - runner: ubuntu-latest
            rust_target: armv7-linux-androideabi
            artifact: libportable_pty_rs.so
            os_label: android-arm
            cross: true
          - runner: ubuntu-latest
            rust_target: x86_64-linux-android
            artifact: libportable_pty_rs.so
            os_label: android-x64
            cross: true

          # ── iOS (from macOS) ──
          - runner: macos-latest
            rust_target: aarch64-apple-ios
            artifact: libportable_pty_rs.a
            os_label: ios-arm64
          - runner: macos-latest
            rust_target: aarch64-apple-ios-sim
            artifact: libportable_pty_rs.a
            os_label: ios-sim-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.rust_target }}

      - name: Install cross (for cross-compiled targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Android NDK
        if: startsWith(matrix.os_label, 'android-')
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Build PTY native library
        working-directory: pkgs/pty/portable_pty/rust
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release --target ${{ matrix.rust_target }}
          fi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        shell: bash

      - name: Package artifact
        run: |
          mkdir -p staging
          LIB=$(find pkgs/pty/portable_pty/rust/target/${{ matrix.rust_target }}/release -name '${{ matrix.artifact }}' -type f | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::Could not find ${{ matrix.artifact }}"
            find pkgs/pty/portable_pty/rust/target/${{ matrix.rust_target }}/release -type f -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.a'
            exit 1
          fi
          cp "$LIB" staging/${{ matrix.artifact }}
          cd staging
          tar czf ../pty-${{ matrix.os_label }}.tar.gz ${{ matrix.artifact }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pty-${{ matrix.os_label }}
          path: pty-${{ matrix.os_label }}.tar.gz

  # ════════════════════════════════════════════════════════════════════
  #  Release — collect PTY artifacts and publish a GitHub release
  # ════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/portable_pty-v') || github.event.inputs.tag != ''
    needs: [pty-native]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release metadata
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VERSION="${TAG##*-v}"
            if printf '%s' "$VERSION" | grep -q -- '-'; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "Prerelease: $PRERELEASE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.tag }}"
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            artifacts/**/*.tar.gz

  # ════════════════════════════════════════════════════════════════════
  #  Update asset hashes — regenerate and commit after release
  # ════════════════════════════════════════════════════════════════════
  update-hashes:
    name: Update Asset Hashes
    if: needs.release.outputs.prerelease != 'true'
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate asset hashes
        run: dart run tool/write_asset_hashes.dart --tag ${{ needs.release.outputs.tag }} --package pty
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/pty/portable_pty/lib/src/hook/asset_hashes.dart
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update asset hashes for ${{ needs.release.outputs.tag }}"
            git push
          fi
